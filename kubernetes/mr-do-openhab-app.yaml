apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-openhab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-openhab.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: mr-do-openhab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # LoadBalancer assigns external IP/status at runtime — ArgoCD must not self-heal this
    - group: ""
      kind: Service
      jsonPointers:
        - /status
        - /spec.clusterIP
        - /spec.clusterIPs
        - /spec.externalTrafficPolicy
        - /spec.ipFamilyPolicy
        - /spec.ipFamilies
        - /spec.sessionsAffinity
