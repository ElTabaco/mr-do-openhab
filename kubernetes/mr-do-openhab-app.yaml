apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-openhab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/HelperFiles.git
    targetRevision: main
    path: kubernetes/openhab
  destination:
    server: https://kubernetes.default.svc
    namespace: mr-do-openhab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true