apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-openhab
  name: mr-do-openhab-service
spec:
  selector:
    app: mr-do-openhab
  type: LoadBalancer
  loadBalancerIP: 192.168.0.22
  # externalTrafficPolicy: Local preserves the real client source IP.
  # Without this, kube-proxy MASQUERADE rewrites UDP source IPs to 10.42.0.0,
  # and the Shelly binding can't match CoIoT push packets to devices → silently dropped.
  # With Local, MetalLB only announces the VIP from the node running the pod → no SNAT.
  externalTrafficPolicy: Local
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: webinterface
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: https-webinterface
    - port: 5683
      targetPort: 5683
      protocol: UDP
      name: coiot-peer
    - port: 5684
      targetPort: 5684
      protocol: TCP
      name: coap-secure-port
