apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mr-do-openhab
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ElTabaco/mr-do-openhab.git
    targetRevision: main
    path: kubernetes/openhab
  destination:
    server: https://kubernetes.default.svc
    namespace: mr-do-openhab
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  ignoreDifferences:
    # Protect the shared PVC: if it sticks in Terminating due to MQTT still
    # using it, ArgoCD would otherwise self-heal-and-prune. This tells
    # ArgoCD to ignore status changes.
    - group: ""
      kind: PersistentVolumeClaim
      name: mr-do-openhab-pvc-data
      jsonPointers:
        - /status
        - /metadata.finalizers
