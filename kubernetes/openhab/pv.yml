# ── Environment-specific ──
# The NFS server IP (192.168.0.200 = mr0) and path (/srv/nfs4/homes/mr/openhab) are
# specific to this deployment. Update these values when deploying to a
# different cluster or NFS server.
#
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mr-do-openhab-pv-data
  labels:
    usage: mr-do-openhab-pv-data
spec:
  capacity:
    storage: 4Gi
  storageClassName: ""
  persistentVolumeReclaimPolicy: Retain
  accessModes:
  - ReadWriteMany
  volumeMode: Filesystem
  nfs:
    server: mr0.local
    path: "/srv/nfs4/homes/mr/openhab"
    readOnly: false
