apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: mr-do-openhab
  name: mr-do-openhab
  labels:
    app: mr-do-openhab
spec:
  replicas: 1
  revisionHistoryLimit: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mr-do-openhab
  template:
    metadata:
      labels:
        app: mr-do-openhab
    spec:
      # nodeSelector:
      #   cputype: arm64
      securityContext:
        runAsNonRoot: true
        runAsUser: 9001      # openhab user in image
        fsGroup: 9001        # ensures PV files are group-writable
      containers:
        - name: openhab
          image: openhab/openhab:4.3.5-alpine
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 8443
              protocol: TCP
            - containerPort: 5683
              protocol: UDP
            - containerPort: 5684
              protocol: TCP
          env:
            - name: TZ
              value: Europe/Berlin
            # MQTT broker location (ClusterIP service, stable DNS name)
            - name: OPENHAB_MQTT__BROKER
              value: tcp://mqtt:1883
            # Anonymous connection requires mosquitto.conf 'allow_anonymous true'
            # (or set up a user/pass in services/mqtt.cfg + mosquitto password file)
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            # --- /openhab/conf/* : user configuration only ---
            - name: openhab-data
              mountPath: /openhab/conf/items
              subPath: openhab/conf/items
            - name: openhab-data
              mountPath: /openhab/conf/things
              subPath: openhab/conf/things
            - name: openhab-data
              mountPath: /openhab/conf/rules
              subPath: openhab/conf/rules
            - name: openhab-data
              mountPath: /openhab/conf/scripts
              subPath: openhab/conf/scripts
            - name: openhab-data
              mountPath: /openhab/conf/sitemaps
              subPath: openhab/conf/sitemaps
            - name: openhab-data
              mountPath: /openhab/conf/services
              subPath: openhab/conf/services
            - name: openhab-data
              mountPath: /openhab/conf/persistence
              subPath: openhab/conf/persistence
            - name: openhab-data
              mountPath: /openhab/conf/transformations
              subPath: openhab/conf/transformations
            - name: openhab-data
              mountPath: /openhab/conf/html
              subPath: openhab/conf/html
            - name: openhab-data
              mountPath: /openhab/conf/icons/classic
              subPath: openhab/conf/icons/classic
            # --- /openhab/userdata/* : user state only ---
            - name: openhab-data
              mountPath: /openhab/userdata/jsondb
              subPath: openhab/userdata/jsondb
            # secrets: instance UUID + secret (openHAB Cloud identification)
            - name: openhab-data
              mountPath: /openhab/userdata/secrets
              subPath: openhab/userdata/secrets
            # config: OSGi Config Admin (Cloud Connector settings, addon configs)
            - name: openhab-data
              mountPath: /openhab/userdata/config
              subPath: openhab/userdata/config
            # --- /openhab/addons : manual add-ons ---
            - name: openhab-data
              mountPath: /openhab/addons
              subPath: openhab/addons
      volumes:
        - name: openhab-data
          persistentVolumeClaim:
            claimName: mr-do-openhab-pvc-data
