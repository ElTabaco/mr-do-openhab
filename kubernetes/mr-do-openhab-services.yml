apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-openhab
  name: mr-do-openhab-service
spec:
  # Both openhab and mqtt pods are selected — single IP for all ports,
  # like the original setup, but with independent failure domains.
  selector:
    stack: mr-do-openhab   # shared label applied to both deployments (see patch below)
  type: LoadBalancer
  loadBalancerIP: 192.168.0.22
  ports:
    # openHAB
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: webinterface
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: https-webinterface
    - port: 5683
      targetPort: 5683
      protocol: UDP
      name: coiot-peer
    - port: 5684
      targetPort: 5684
      protocol: TCP
      name: coap-secure-port
    # mqtt
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: mqtt-websockets
    - port: 1883
      targetPort: 1883
      protocol: TCP
      name: mqtt
