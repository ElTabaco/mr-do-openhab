apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-openhab
  name: mr-do-openhab-mqtt-service
spec:
  selector:
    app: mr-do-openhab-mqtt
  type: LoadBalancer
  ports:
    - port: 1883
      targetPort: 1883
      protocol: TCP
      name: mqtt
    - port: 9001
      targetPort: 9001
      protocol: TCP
      name: mqtt-websockets

---
apiVersion: v1
kind: Service
metadata:
  namespace: mr-do-openhab
  name: mr-do-openhab-service
spec:
  selector:
    app: mr-do-openhab
  type: LoadBalancer
  # Environment-specific: MetalLB IP for openHAB web UI
  # Change this to match your MetalLB address pool / network
  loadBalancerIP: 192.168.0.22
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: webinterface
    - port: 8443
      targetPort: 8443
      protocol: TCP
      name: https-webinterface
    - port: 5683
      targetPort: 5683
      protocol: UDP
      name: coiot-peer
    - port: 5684
      targetPort: 5684
      protocol: TCP
      name: coap-secure-port
