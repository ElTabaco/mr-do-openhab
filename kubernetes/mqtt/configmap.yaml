apiVersion: v1
kind: ConfigMap
metadata:
  namespace: mr-do-openhab
  name: mqtt-config
data:
  mosquitto.conf: |
    # Mosquitto MQTT broker configuration
    # Managed by ArgoCD — do not edit on the server directly.
    
    persistence true
    persistence_location /mosquitto/data/
    autosave_interval 1800
    
    # MQTT listener (standard)
    listener 1883
    allow_anonymous true
    
    # WebSocket listener (for browser-based clients)
    listener 9001
    protocol websockets
    allow_anonymous true
